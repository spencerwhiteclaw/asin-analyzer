<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set New Password — ASIN Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--blue:#3B82F6;--blue-dark:#2563EB;--green:#10B981;--red:#EF4444;--text:#0F172A;--text2:#475569;--muted:#94A3B8;--border:#E2E8F0;--bg:#FFFFFF;--bg2:#F8FAFC;--r:12px;--r3:20px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg2);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;}
nav{display:flex;align-items:center;justify-content:center;padding:20px 40px;border-bottom:1px solid var(--border);background:var(--bg);}
.logo-text{font-family:'Plus Jakarta Sans',sans-serif;font-size:21px;font-weight:800;color:var(--text);text-decoration:none;}.logo-text span{color:var(--blue);}
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;}
.auth-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r3);padding:40px;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.04);}
.auth-card h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;font-weight:800;text-align:center;margin-bottom:4px;}
.auth-card .sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:28px;}
.form-group{margin-bottom:16px;}.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.form-group input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:var(--r);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;}.form-group input:focus{border-color:var(--blue);}
.auth-btn{display:block;width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;}
.auth-btn:hover{background:var(--blue-dark);}
.auth-btn:disabled{opacity:0.6;cursor:not-allowed;}
.msg{padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:16px;display:none;}
.msg.success{background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);color:var(--green);display:block;}
.msg.error{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);color:var(--red);display:block;}
</style>
</head>
<body>
<nav><a href="/" class="logo-text">ASIN <span>Analyzer</span></a></nav>
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Set new password</h1>
    <p class="sub">Enter your new password below</p>
    <div id="msgBox"></div>
    <form onsubmit="handleSetPassword(event)">
      <div class="form-group"><label>New Password</label><input type="password" id="password" placeholder="Minimum 8 characters" required minlength="8" /></div>
      <div class="form-group"><label>Confirm Password</label><input type="password" id="confirm" placeholder="Confirm new password" required /></div>
      <button type="submit" class="auth-btn" id="setBtn">Set New Password →</button>
    </form>
  </div>
</div>
<script>
async function handleSetPassword(e) {
  e.preventDefault();
  const pw = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  if (pw !== confirm) { document.getElementById('msgBox').innerHTML = '<div class="msg error">Passwords do not match.</div>'; return; }
  if (pw.length < 8) { document.getElementById('msgBox').innerHTML = '<div class="msg error">Password must be 8+ characters.</div>'; return; }

  const btn = document.getElementById('setBtn');
  btn.disabled = true; btn.textContent = 'Updating...';

  // Get access_token from URL hash (Supabase sends it as fragment)
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const accessToken = params.get('access_token');

  try {
    const resp = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}` },
      body: JSON.stringify({ password: pw }),
    });

    if (resp.ok) {
      document.getElementById('msgBox').innerHTML = '<div class="msg success">Password updated! Redirecting to login...</div>';
      setTimeout(() => window.location.href = '/login', 2000);
    } else {
      document.getElementById('msgBox').innerHTML = '<div class="msg error">Failed to reset password. The link may have expired.</div>';
    }
  } catch(e) {
    document.getElementById('msgBox').innerHTML = '<div class="msg error">Connection error.</div>';
  }
  btn.disabled = false; btn.textContent = 'Set New Password →';
}
</script>
</body>
</html>
