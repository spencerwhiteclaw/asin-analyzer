<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — ASIN Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--blue:#3B82F6;--blue-dark:#2563EB;--green:#10B981;--red:#EF4444;--text:#0F172A;--text2:#475569;--muted:#94A3B8;--border:#E2E8F0;--bg:#FFFFFF;--bg2:#F8FAFC;--r:12px;--r3:20px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg2);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;}
nav{display:flex;align-items:center;justify-content:center;padding:20px 40px;border-bottom:1px solid var(--border);background:var(--bg);}
.logo-text{font-family:'Plus Jakarta Sans',sans-serif;font-size:21px;font-weight:800;color:var(--text);text-decoration:none;}.logo-text span{color:var(--blue);}
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;}
.auth-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r3);padding:40px;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.04);}
.auth-card h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;font-weight:800;text-align:center;margin-bottom:4px;}
.auth-card .sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:28px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.form-group input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:var(--r);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;}.form-group input:focus{border-color:var(--blue);}
.auth-btn{display:block;width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-bottom:16px;}
.auth-btn:hover{background:var(--blue-dark);}
.auth-btn:disabled{opacity:0.6;cursor:not-allowed;}
.auth-footer{text-align:center;margin-top:20px;font-size:14px;color:var(--text2);}.auth-footer a{color:var(--blue);font-weight:600;text-decoration:none;}
.msg{padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:16px;display:none;}
.msg.success{background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);color:var(--green);display:block;}
.msg.error{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);color:var(--red);display:block;}
</style>
</head>
<body>
<nav><a href="/" class="logo-text">ASIN <span>Analyzer</span></a></nav>
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Forgot password?</h1>
    <p class="sub">Enter your email and we'll send you a reset link</p>
    <div id="msgBox"></div>
    <form onsubmit="handleReset(event)">
      <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@example.com" required /></div>
      <button type="submit" class="auth-btn" id="resetBtn">Send Reset Link →</button>
    </form>
    <div class="auth-footer"><a href="/login">← Back to login</a></div>
  </div>
</div>
<script>
async function handleReset(e) {
  e.preventDefault();
  const btn = document.getElementById('resetBtn');
  const email = document.getElementById('email').value.trim();
  btn.disabled = true; btn.textContent = 'Sending...';
  try {
    const resp = await fetch('/api/auth/forgot-password', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email}) });
    document.getElementById('msgBox').innerHTML = resp.ok
      ? '<div class="msg success">If that email exists, a reset link has been sent. Check your inbox.</div>'
      : '<div class="msg error">Something went wrong. Please try again.</div>';
  } catch(e) { document.getElementById('msgBox').innerHTML = '<div class="msg error">Connection error.</div>'; }
  btn.disabled = false; btn.textContent = 'Send Reset Link →';
}
</script>
</body>
</html>
