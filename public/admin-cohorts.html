<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cohort Retention - ASIN Analyzer Admin</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0e17;
            color: #f9fafb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            background-color: #111827;
            border-bottom: 1px solid #1f2937;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .nav-logo {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-links a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #f9fafb;
        }

        .nav-links a.active {
            color: #f59e0b;
            border-bottom: 2px solid #f59e0b;
            padding-bottom: 0.25rem;
        }

        .nav-right a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .nav-right a:hover {
            color: #f9fafb;
        }

        /* Main content */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
        }

        /* Toggle switch */
        .toggle-group {
            display: flex;
            gap: 0.5rem;
            background-color: #111827;
            border-radius: 0.5rem;
            padding: 0.25rem;
            border: 1px solid #1f2937;
        }

        .toggle-btn {
            padding: 0.5rem 1rem;
            border: none;
            background-color: transparent;
            color: #9ca3af;
            cursor: pointer;
            border-radius: 0.375rem;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background-color: #f59e0b;
            color: #0a0e17;
            font-weight: 500;
        }

        .toggle-btn:hover:not(.active) {
            color: #f9fafb;
        }

        /* Card */
        .card {
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 0.75rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        /* Cohort grid */
        .cohort-grid-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        th {
            background-color: #0a0e17;
            border-bottom: 2px solid #1f2937;
            padding: 0.75rem;
            text-align: right;
            color: #9ca3af;
            font-weight: 500;
        }

        th:first-child {
            text-align: left;
        }

        td {
            padding: 0.75rem;
            border-bottom: 1px solid #1f2937;
            text-align: right;
        }

        td:first-child {
            text-align: left;
            color: #f9fafb;
            font-weight: 500;
            min-width: 150px;
        }

        .cohort-cell {
            border-radius: 0.375rem;
            font-weight: 500;
            color: #ffffff;
        }

        .cohort-cell.excellent {
            background-color: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .cohort-cell.good {
            background-color: rgba(234, 179, 8, 0.2);
            color: #fbbf24;
        }

        .cohort-cell.fair {
            background-color: rgba(249, 158, 11, 0.2);
            color: #f59e0b;
        }

        .cohort-cell.poor {
            background-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        /* Summary stats */
        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: #0a0e17;
            border: 1px solid #1f2937;
            border-radius: 0.5rem;
            padding: 1rem;
        }

        .stat-label {
            color: #9ca3af;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: #f9fafb;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn-primary {
            background-color: #f59e0b;
            color: #0a0e17;
        }

        .btn-primary:hover {
            background-color: #d97706;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #9ca3af;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state-title {
            font-size: 1.25rem;
            font-weight: 500;
            color: #f9fafb;
            margin-bottom: 0.5rem;
        }

        .empty-state-text {
            color: #9ca3af;
        }

        /* Loading state */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            color: #9ca3af;
        }

        .spinner {
            border: 2px solid #1f2937;
            border-top: 2px solid #f59e0b;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 0.8s linear infinite;
            margin-right: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error state */
        .error {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fecaca;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-left">
            <div class="nav-logo">ASIN Analyzer Admin</div>
            <ul class="nav-links">
                <li><a href="/admin">Overview</a></li>
                <li><a href="/admin/customers">Customers</a></li>
                <li><a href="/admin/cohorts" class="active">Cohorts</a></li>
                <li><a href="/admin/financials">Financials</a></li>
                <li><a href="/admin/affiliates">Affiliates</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <a href="/">Back to Site</a>
        </div>
    </nav>

    <!-- Main content -->
    <div class="container">
        <div class="header">
            <h1>Cohort Retention</h1>
            <div class="toggle-group">
                <button class="toggle-btn active" data-metric="count">By Subscriber Count</button>
                <button class="toggle-btn" data-metric="revenue">By Revenue (Dollar Retention)</button>
            </div>
        </div>

        <div id="error-container"></div>

        <!-- Cohort grid card -->
        <div class="card">
            <div id="content-area">
                <div class="loading">
                    <div class="spinner"></div>
                    <span>Loading cohort data...</span>
                </div>
            </div>
        </div>

        <!-- Summary stats -->
        <div id="summary-stats-container"></div>

        <!-- Export button -->
        <div class="button-group">
            <button class="btn-primary" id="export-btn">Export as CSV</button>
        </div>
    </div>

    <script>
        // Auth check
        async function checkAuth() {
            const token = localStorage.getItem('supabase_token');
            if (!token) {
                window.location.href = '/admin-login';
                return false;
            }

            try {
                const res = await fetch('/api/admin/check-access', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) {
                    localStorage.removeItem('supabase_token');
                    window.location.href = '/admin-login';
                    return false;
                }
            } catch (err) {
                console.error('Auth check failed:', err);
                window.location.href = '/admin-login';
                return false;
            }
            return true;
        }

        // State
        let cohortData = null;
        let currentMetric = 'count';

        // Fetch cohort retention data
        async function fetchCohortData() {
            const token = localStorage.getItem('supabase_token');
            try {
                const res = await fetch('/api/admin/cohort-retention', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Failed to fetch cohort data');
                cohortData = await res.json();
                renderCohortGrid();
                renderSummaryStats();
            } catch (err) {
                console.error('Error fetching cohort data:', err);
                showError('Failed to load cohort data. Please try again.');
            }
        }

        // Show error
        function showError(message) {
            const container = document.getElementById('error-container');
            container.innerHTML = `<div class="error">${message}</div>`;
        }

        // Render cohort grid
        function renderCohortGrid() {
            const contentArea = document.getElementById('content-area');

            if (!cohortData || !cohortData.cohorts || cohortData.cohorts.length === 0) {
                contentArea.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <div class="empty-state-title">Not enough data yet</div>
                        <div class="empty-state-text">Cohort analysis begins after your first month of subscribers.</div>
                    </div>
                `;
                return;
            }

            // Get max months to display
            const maxMonths = Math.max(...cohortData.cohorts.map(c => c.retention.length));
            const headers = ['Cohort', ...Array.from({ length: maxMonths }, (_, i) => `Month ${i}`)];

            let tableHtml = '<div class="cohort-grid-wrapper"><table><thead><tr>';
            headers.forEach((header, idx) => {
                tableHtml += `<th>${header}</th>`;
            });
            tableHtml += '</tr></thead><tbody>';

            cohortData.cohorts.forEach(cohort => {
                const monthLabel = new Date(cohort.month + '-01').toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
                tableHtml += `<tr><td>${monthLabel} (${cohort.cohort_size} users)</td>`;

                cohort.retention.forEach(retention => {
                    const colorClass = getRetentionColor(retention);
                    tableHtml += `<td><span class="cohort-cell ${colorClass}">${retention}%</span></td>`;
                });

                // Fill empty cells
                const emptyCount = maxMonths - cohort.retention.length;
                for (let i = 0; i < emptyCount; i++) {
                    tableHtml += '<td>—</td>';
                }

                tableHtml += '</tr>';
            });

            tableHtml += '</tbody></table></div>';
            contentArea.innerHTML = tableHtml;
        }

        // Get retention color class
        function getRetentionColor(retention) {
            if (retention >= 80) return 'excellent';
            if (retention >= 60) return 'good';
            if (retention >= 40) return 'fair';
            return 'poor';
        }

        // Render summary stats
        function renderSummaryStats() {
            const container = document.getElementById('summary-stats-container');

            if (!cohortData || !cohortData.cohorts || cohortData.cohorts.length === 0) {
                container.innerHTML = '';
                return;
            }

            // Calculate Month 1, 3, 6 averages
            const month1Retentions = cohortData.cohorts
                .filter(c => c.retention.length > 1)
                .map(c => c.retention[1]);
            const month1Avg = month1Retentions.length > 0
                ? (month1Retentions.reduce((a, b) => a + b, 0) / month1Retentions.length).toFixed(1)
                : 'N/A';

            const month3Retentions = cohortData.cohorts
                .filter(c => c.retention.length > 3)
                .map(c => c.retention[3]);
            const month3Avg = month3Retentions.length > 0
                ? (month3Retentions.reduce((a, b) => a + b, 0) / month3Retentions.length).toFixed(1)
                : 'N/A';

            const month6Retentions = cohortData.cohorts
                .filter(c => c.retention.length > 6)
                .map(c => c.retention[6]);
            const month6Avg = month6Retentions.length > 0
                ? (month6Retentions.reduce((a, b) => a + b, 0) / month6Retentions.length).toFixed(1)
                : 'N/A';

            // Find best performing cohort
            let bestCohort = { name: 'N/A', retention: 0 };
            cohortData.cohorts.forEach(cohort => {
                const avgRetention = cohort.retention.reduce((a, b) => a + b, 0) / cohort.retention.length;
                if (avgRetention > bestCohort.retention) {
                    const monthLabel = new Date(cohort.month + '-01').toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
                    bestCohort = { name: monthLabel, retention: avgRetention.toFixed(1) };
                }
            });

            const statsHtml = `
                <div class="summary-stats">
                    <div class="stat-card">
                        <div class="stat-label">Average Month 1 Retention</div>
                        <div class="stat-value">${month1Avg}${month1Avg !== 'N/A' ? '%' : ''}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Average Month 3 Retention</div>
                        <div class="stat-value">${month3Avg}${month3Avg !== 'N/A' ? '%' : ''}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Average Month 6 Retention</div>
                        <div class="stat-value">${month6Avg}${month6Avg !== 'N/A' ? '%' : ''}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Best Performing Cohort</div>
                        <div class="stat-value">${bestCohort.name}</div>
                    </div>
                </div>
            `;

            container.innerHTML = statsHtml;
        }

        // Export as CSV
        function exportCSV() {
            if (!cohortData || !cohortData.cohorts.length) {
                alert('No data to export');
                return;
            }

            const maxMonths = Math.max(...cohortData.cohorts.map(c => c.retention.length));
            const headers = ['Cohort', ...Array.from({ length: maxMonths }, (_, i) => `Month ${i}`)];

            let csv = headers.join(',') + '\n';

            cohortData.cohorts.forEach(cohort => {
                const monthLabel = new Date(cohort.month + '-01').toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
                const row = [`"${monthLabel} (${cohort.cohort_size} users)"`, ...cohort.retention];
                csv += row.join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `cohort-retention-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        // Toggle metric
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMetric = btn.dataset.metric;
                // TODO: Re-fetch with different metric if API supports it
            });
        });

        // Export button
        document.getElementById('export-btn').addEventListener('click', exportCSV);

        // Initialize
        (async () => {
            if (await checkAuth()) {
                await fetchCohortData();
            }
        })();
    </script>
</body>
</html>
