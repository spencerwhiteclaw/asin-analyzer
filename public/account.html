<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Settings — ASIN Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--blue:#3B82F6;--blue-dark:#2563EB;--green:#10B981;--red:#EF4444;--text:#0F172A;--text2:#475569;--muted:#94A3B8;--border:#E2E8F0;--bg:#FFFFFF;--bg2:#F8FAFC;--bg3:#F1F5F9;--r:12px;--r2:16px;--r3:20px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg2);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.6;}
.dash-nav{display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto;padding:16px 40px;background:var(--bg);border-bottom:1px solid var(--border);}
.logo-text{font-family:'Plus Jakarta Sans',sans-serif;font-size:21px;font-weight:800;color:var(--text);text-decoration:none;}
.logo-text span{color:var(--blue);}
.dash-nav-r{display:flex;align-items:center;gap:24px;}
.dash-nav-r a{color:var(--text2);font-size:14px;font-weight:500;text-decoration:none;}
.dash-nav-r a:hover{color:var(--text);}
.dash-nav-r a.active{color:var(--blue);font-weight:600;}
.wrap{max-width:720px;margin:0 auto;padding:32px 24px 80px;}
h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:28px;font-weight:800;margin-bottom:28px;}
.section{background:var(--bg);border:1px solid var(--border);border-radius:var(--r3);padding:24px;margin-bottom:20px;}
.section h2{font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:700;margin-bottom:16px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.form-group input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:var(--r);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;}
.form-group input:focus{border-color:var(--blue);}
.form-group input:read-only{background:var(--bg2);color:var(--muted);}
.save-btn{padding:10px 20px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;}
.save-btn:hover{background:var(--blue-dark);}
.plan-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--bg3);}
.plan-row:last-child{border:none;}
.plan-row label{font-size:14px;color:var(--text2);}
.plan-row strong{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;}
.billing-btn{padding:10px 20px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:var(--r);font-weight:600;font-size:14px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;}
.billing-btn:hover{background:var(--bg3);}
.danger-zone{border-color:rgba(239,68,68,0.2);}
.danger-zone h2{color:var(--red);}
.danger-btn{padding:10px 20px;background:rgba(239,68,68,0.06);color:var(--red);border:1px solid rgba(239,68,68,0.2);border-radius:var(--r);font-weight:600;font-size:14px;cursor:pointer;transition:all .2s;}
.danger-btn:hover{background:rgba(239,68,68,0.12);}
.msg{padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:12px;display:none;}
.msg.success{background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);color:var(--green);display:block;}
.msg.error{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);color:var(--red);display:block;}
</style>
</head>
<body>
<div class="dash-nav">
  <a href="/" class="logo-text">ASIN <span>Analyzer</span></a>
  <div class="dash-nav-r">
    <a href="/dashboard">Dashboard</a>
    <a href="/dashboard/history">History</a>
    <a href="/dashboard/account" class="active">Account</a>
  </div>
</div>

<div class="wrap">
  <h1>Account Settings</h1>

  <div id="msgBox"></div>

  <!-- Profile -->
  <div class="section">
    <h2>Profile</h2>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" readonly />
    </div>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="name" placeholder="Your name" />
    </div>
    <button class="save-btn" onclick="updateProfile()">Save Changes</button>
  </div>

  <!-- Change Password -->
  <div class="section">
    <h2>Change Password</h2>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="newPw" placeholder="Minimum 8 characters" minlength="8" />
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" id="confirmPw" placeholder="Confirm new password" />
    </div>
    <button class="save-btn" onclick="changePassword()">Update Password</button>
  </div>

  <!-- Subscription -->
  <div class="section">
    <h2>Subscription & Billing</h2>
    <div class="plan-row"><label>Current Plan</label><strong id="planName">Loading...</strong></div>
    <div class="plan-row"><label>Reports This Month</label><strong id="planUsage">—</strong></div>
    <div class="plan-row"><label>Status</label><strong id="planStatus">—</strong></div>
    <div class="plan-row"><label>Next Billing</label><strong id="nextBill">—</strong></div>
    <div style="margin-top:16px;display:flex;gap:10px;">
      <a href="/pricing" class="billing-btn">Change Plan</a>
      <button class="billing-btn" onclick="openBillingPortal()">Manage Billing →</button>
    </div>
  </div>

  <!-- Danger Zone -->
  <div class="section danger-zone">
    <h2>Danger Zone</h2>
    <p style="font-size:14px;color:var(--text2);margin-bottom:16px;">Cancelling your subscription will downgrade you to the free tier at the end of your billing period. Your reports will be preserved.</p>
    <button class="danger-btn" onclick="cancelSubscription()">Cancel Subscription</button>
    <button class="danger-btn" onclick="handleLogout()" style="margin-left:10px;">Log Out</button>
  </div>
</div>

<script>
const token = localStorage.getItem('sb_access_token');
if (!token) window.location.href = '/login';

async function loadAccount() {
  try {
    const resp = await fetch('/api/dashboard', { headers: { 'Authorization': `Bearer ${token}` } });
    if (resp.status === 401) { window.location.href = '/login'; return; }
    const data = await resp.json();
    const u = data.user;

    document.getElementById('email').value = u.email || '';
    document.getElementById('name').value = u.name || '';

    const tierNames = { free:'Free', seller:'Seller ($19/mo)', agency_power:'Agency Power ($39/mo)', agency:'Agency ($49/mo)', enterprise:'Enterprise ($199/mo)' };
    const tierLimits = { free:1, seller:10, agency_power:100, agency:50, enterprise:300 };
    const tier = u.subscription_tier || 'free';

    document.getElementById('planName').textContent = tierNames[tier] || tier;
    document.getElementById('planUsage').textContent = `${u.analyses_this_month || 0} / ${tierLimits[tier] || 1}`;
    document.getElementById('planStatus').textContent = u.subscription_status === 'active' ? '✓ Active' : (u.subscription_status || 'Free');
    document.getElementById('planStatus').style.color = u.subscription_status === 'active' ? 'var(--green)' : 'var(--muted)';
  } catch (e) { console.error(e); }
}

async function updateProfile() {
  const name = document.getElementById('name').value.trim();
  try {
    const resp = await fetch('/api/account/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ name }),
    });
    showMsg(resp.ok ? 'success' : 'error', resp.ok ? 'Profile updated.' : 'Update failed.');
  } catch (e) { showMsg('error', 'Connection error.'); }
}

async function changePassword() {
  const pw = document.getElementById('newPw').value;
  const confirm = document.getElementById('confirmPw').value;
  if (pw !== confirm) { showMsg('error', 'Passwords do not match.'); return; }
  if (pw.length < 8) { showMsg('error', 'Password must be 8+ characters.'); return; }

  try {
    const resp = await fetch('/api/auth/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ password: pw }),
    });
    showMsg(resp.ok ? 'success' : 'error', resp.ok ? 'Password updated.' : 'Failed to update password.');
    if (resp.ok) { document.getElementById('newPw').value = ''; document.getElementById('confirmPw').value = ''; }
  } catch (e) { showMsg('error', 'Connection error.'); }
}

async function openBillingPortal() {
  try {
    const resp = await fetch('/api/stripe/portal', { headers: { 'Authorization': `Bearer ${token}` } });
    const data = await resp.json();
    if (data.url) window.location.href = data.url;
    else showMsg('error', 'Billing portal not available.');
  } catch (e) { showMsg('error', 'Connection error.'); }
}

async function cancelSubscription() {
  if (!confirm('Are you sure? You will be downgraded to Free at the end of your billing period.')) return;
  try {
    const resp = await fetch('/api/stripe/cancel', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}` },
    });
    showMsg(resp.ok ? 'success' : 'error', resp.ok ? 'Subscription cancelled. Access continues until end of billing period.' : 'Cancellation failed.');
  } catch (e) { showMsg('error', 'Connection error.'); }
}

function handleLogout() {
  localStorage.removeItem('sb_access_token');
  localStorage.removeItem('sb_refresh_token');
  window.location.href = '/';
}

function showMsg(type, text) {
  document.getElementById('msgBox').innerHTML = `<div class="msg ${type}">${text}</div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

loadAccount();
</script>
</body>
</html>
